default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV["DB_PASSWORD"] %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME_DEVELOPMENT", "speakflow_app_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME_TEST", "speakflow_app_test") %>

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DB_NAME_PRODUCTION", "speakflow_app_production") %>
    username: <%= ENV.fetch("DB_USERNAME_PRODUCTION", "speakflow_app") %>
    password: <%= ENV["SPEAKFLOW_APP_DATABASE_PASSWORD"] || ENV["DB_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: <%= ENV.fetch("DB_NAME_PRODUCTION_CACHE", "speakflow_app_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV.fetch("DB_NAME_PRODUCTION_QUEUE", "speakflow_app_production_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV.fetch("DB_NAME_PRODUCTION_CABLE", "speakflow_app_production_cable") %>
    migrations_paths: db/cable_migrate
