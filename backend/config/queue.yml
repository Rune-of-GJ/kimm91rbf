default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
      recurring_tasks:
        expire_subscriptions:
          class: ExpireSubscriptionsJob
          schedule: "0 3 * * *"
          queue: default
          description: "만료된 멤버십 구독 상태 업데이트"
        settlement_report:
          class: SettlementReportJob
          schedule: "0 4 * * 1"
          queue: default
          description: "주간 정산 리포트"
        clean_old_uploads:
          class: CleanOldUploadsJob
          schedule: "0 2 * * 0"
          queue: default
          description: "오래된 업로드 파일 정리"

  workers:
    - queues: "*"
      threads: 3
      polling_interval: 2
      processes: 1

development:
  <<: *default

production:
  <<: *default
  connects_to:
    database:
      writing: queue
