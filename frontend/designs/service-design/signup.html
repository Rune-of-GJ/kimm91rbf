<body>
<main class="shell"><header class="topbar"><h1 class="brand">SPEAKFLOW P1</h1><span class="tag">회원가입</span></header>
<section class="layout"><aside class="sidebar"><p class="menu-title">Pages</p><nav class="menu">
<a href="./index.html">홈 대시보드</a><a class="active" href="./signup.html">회원가입</a><a href="./login.html">로그인</a><a href="./categories.html">카테고리</a><a href="./courses.html">강의 목록</a><a href="./course-detail.html">강의 상세</a><a href="./my-courses.html">내 강의</a><a href="./lecture-player.html">강의 시청</a><a href="./progress.html">진도 관리</a>

<section class="content">
  <article class="form-card">
    <h2>회원가입</h2>
    <p class="small-note">실제 요청 필드는 `name`, `email`, `password`입니다.</p>
    <div class="field"><label>이름</label><input type="text" placeholder="기본 수강생" /></div>
    <div class="field"><label>이메일</label><input type="email" placeholder="student@speakflow.kr" /></div>
    <div class="field"><label>비밀번호</label><input type="password" placeholder="최소 8자" /></div>
    <div class="badge-row"><span class="badge">password_digest 저장</span><span class="badge">role 기본값: student</span><span class="badge">created_at 기록</span></div>
    <div class="btn-row"><button class="btn primary" type="button">회원가입</button></div>
  </article>
</section></section></main>
</body>
</html>
