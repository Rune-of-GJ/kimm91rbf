<body>
<main class="shell"><header class="topbar"><h1 class="brand">SPEAKFLOW P1</h1><span class="tag">로그인</span></header>
<section class="layout"><aside class="sidebar"><p class="menu-title">Pages</p><nav class="menu">
<a href="./index.html">홈 대시보드</a><a href="./signup.html">회원가입</a><a class="active" href="./login.html">로그인</a><a href="./categories.html">카테고리</a><a href="./courses.html">강의 목록</a><a href="./course-detail.html">강의 상세</a><a href="./my-courses.html">내 강의</a><a href="./lecture-player.html">강의 시청</a><a href="./progress.html">진도 관리</a>

<section class="content">
  <article class="form-card">
    <h2>로그인</h2>
    <p class="small-note">현재 구현은 쿠키 세션 기반입니다. 응답 필드는 `user`, `token_type`, `expires_in`입니다.</p>
    <div class="field"><label>이메일</label><input type="email" placeholder="student@speakflow.kr" /></div>
    <div class="field"><label>비밀번호</label><input type="password" placeholder="password123" /></div>
    <div class="badge-row"><span class="badge">token_type: Session</span><span class="badge">expires_in: 3600</span></div>
    <div class="btn-row"><button class="btn primary" type="button">로그인</button><button class="btn" type="button">세션 갱신</button><button class="btn" type="button">로그아웃</button></div>
    <p class="small-note">오류 응답 예시: Invalid email or password</p>
  </article>
</section></section></main>
